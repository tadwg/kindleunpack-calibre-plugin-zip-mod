<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KindleUnpack Web — WASM Test</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Helvetica Neue', Arial, sans-serif;
  background: #0f0f0f;
  color: #e8e8e0;
  min-height: 100vh;
  padding: 2rem 1rem;
}

.container {
  max-width: 820px;
  margin: 0 auto;
}

h1 {
  font-size: 1.5rem;
  font-weight: 500;
  letter-spacing: -0.02em;
  color: #f0ede6;
  margin-bottom: 0.25rem;
}

.subtitle {
  font-size: 0.8rem;
  color: #666;
  margin-bottom: 2rem;
}

.card {
  background: #181818;
  border: 0.5px solid #2a2a2a;
  border-radius: 10px;
  padding: 1.25rem 1.5rem;
  margin-bottom: 1rem;
}

.card-title {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #555;
  margin-bottom: 0.75rem;
}

/* ステップ */
.steps {
  display: flex;
  gap: 0.5rem;
  margin-bottom: 1.5rem;
  flex-wrap: wrap;
}

.step-btn {
  background: #1e1e1e;
  border: 0.5px solid #333;
  border-radius: 6px;
  color: #aaa;
  font-size: 0.8rem;
  padding: 0.45rem 0.9rem;
  cursor: pointer;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}

.step-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.step-btn:not(:disabled):hover { background: #2a2a2a; color: #ddd; border-color: #444; }
.step-btn.active { border-color: #6b8cff; color: #6b8cff; }
.step-btn.done { border-color: #4caf82; color: #4caf82; }
.step-btn.error { border-color: #e05a5a; color: #e05a5a; }

/* ファイル選択 */
.drop-zone {
  border: 0.5px dashed #333;
  border-radius: 8px;
  padding: 2rem;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  margin-bottom: 1rem;
}
.drop-zone:hover, .drop-zone.dragover { border-color: #6b8cff; background: #1a1a2a; }
.drop-zone input { display: none; }
.drop-zone .icon { font-size: 2rem; margin-bottom: 0.5rem; opacity: 0.4; }
.drop-zone .hint { font-size: 0.8rem; color: #555; margin-top: 0.25rem; }
.drop-zone .filename { font-size: 0.85rem; color: #6b8cff; margin-top: 0.5rem; }

/* フォーマット選択 */
.format-row {
  display: flex; gap: 0.5rem; margin-bottom: 1rem; align-items: center;
}
.format-label { font-size: 0.8rem; color: #666; min-width: 60px; }
.fmt-btn {
  background: #1e1e1e;
  border: 0.5px solid #333;
  border-radius: 5px;
  color: #aaa;
  font-size: 0.8rem;
  padding: 0.35rem 0.75rem;
  cursor: pointer;
  transition: all 0.15s;
}
.fmt-btn.selected { background: #1a1a2a; border-color: #6b8cff; color: #6b8cff; }

.run-btn {
  width: 100%;
  background: #1a1a2a;
  border: 0.5px solid #6b8cff;
  border-radius: 7px;
  color: #6b8cff;
  font-size: 0.85rem;
  padding: 0.6rem;
  cursor: pointer;
  transition: background 0.15s;
  margin-top: 0.5rem;
}
.run-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.run-btn:not(:disabled):hover { background: #222238; }

/* ログ */
.log-wrap {
  position: relative;
}
.log {
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 0.72rem;
  line-height: 1.7;
  background: #111;
  border: 0.5px solid #222;
  border-radius: 8px;
  padding: 0.75rem 1rem;
  min-height: 160px;
  max-height: 420px;
  overflow-y: auto;
  white-space: pre-wrap;
  word-break: break-all;
}
.log .ok  { color: #4caf82; }
.log .err { color: #e05a5a; }
.log .dbg { color: #888; }
.log .inf { color: #6b8cff; }
.log .warn { color: #e0a84c; }

.log-clear {
  position: absolute; top: 0.5rem; right: 0.5rem;
  background: none; border: none; color: #444; font-size: 0.72rem;
  cursor: pointer; padding: 2px 6px; border-radius: 4px;
}
.log-clear:hover { color: #888; background: #1e1e1e; }

/* debug toggle */
.debug-row {
  display: flex; align-items: center; gap: 0.5rem; margin-top: 0.75rem;
}
.toggle {
  width: 32px; height: 18px; background: #2a2a2a; border-radius: 9px;
  position: relative; cursor: pointer; border: 0.5px solid #3a3a3a;
  transition: background 0.15s;
  flex-shrink: 0;
}
.toggle.on { background: #2a3a5a; border-color: #6b8cff; }
.toggle::after {
  content: ''; position: absolute; top: 2px; left: 2px;
  width: 12px; height: 12px; border-radius: 50%; background: #555;
  transition: left 0.15s, background 0.15s;
}
.toggle.on::after { left: 16px; background: #6b8cff; }
.debug-label { font-size: 0.75rem; color: #555; }

/* download */
#dl-wrap { margin-top: 1rem; display: none; }
.dl-btn {
  display: inline-flex; align-items: center; gap: 0.4rem;
  background: #1a2a1a; border: 0.5px solid #4caf82; border-radius: 7px;
  color: #4caf82; font-size: 0.85rem; padding: 0.55rem 1.2rem;
  cursor: pointer; text-decoration: none; transition: background 0.15s;
}
.dl-btn:hover { background: #1e351e; }
</style>
</head>
<body>
<div class="container">
  <h1>KindleUnpack Web <span style="color:#444;font-weight:400;font-size:1rem;">wasm test</span></h1>
  <p class="subtitle">ブラウザ内 Python (Pyodide) で AZW3 → EPUB / ZIP 変換 — サーバ送信なし</p>

  <!-- STEP 1: Pyodide -->
  <div class="card">
    <div class="card-title">Step 1 — 環境</div>
    <div class="steps">
      <button class="step-btn" id="btn-pyodide" onclick="loadPyodide_()">Pyodide をロード</button>
      <button class="step-btn" id="btn-core" disabled onclick="loadCore()">kindleunpackcore をロード</button>
    </div>
    <div style="font-size:0.78rem; color:#555;">初回ロードは30〜60秒かかります（Pyodide本体 約30MB）</div>
  </div>

  <!-- STEP 2: 変換 -->
  <div class="card">
    <div class="card-title">Step 2 — 変換</div>

    <div class="drop-zone" id="drop" onclick="document.getElementById('file-input').click()"
         ondragover="ev.preventDefault();this.classList.add('dragover')"
         ondragleave="this.classList.remove('dragover')"
         ondrop="onDrop(event)">
      <input type="file" id="file-input" accept=".azw3,.azw,.mobi" onchange="onFileSelect(this)">
      <div class="icon">📖</div>
      <div style="font-size:0.85rem; color:#888;">AZW3 / AZW / MOBI をドロップ、またはクリック</div>
      <div class="hint">ファイルはサーバに送信されません</div>
      <div class="filename" id="fname"></div>
    </div>

    <div class="format-row">
      <span class="format-label">出力形式</span>
      <button class="fmt-btn selected" id="fmt-epub" onclick="setFmt('EPUB')">EPUB</button>
      <button class="fmt-btn" id="fmt-zip" onclick="setFmt('ZIP')">ZIP（画像）</button>
      <button class="fmt-btn" id="fmt-zip-d" onclick="setFmt('ZIP_D')">ZIP（圧縮）</button>
    </div>

    <button class="run-btn" id="btn-run" disabled onclick="runConvert()">変換を実行</button>
  </div>

  <!-- ログ -->
  <div class="card">
    <div class="card-title">ログ</div>
    <div class="log-wrap">
      <div class="log" id="log"></div>
      <button class="log-clear" onclick="document.getElementById('log').innerHTML=''">クリア</button>
    </div>
    <div class="debug-row">
      <div class="toggle" id="dbg-toggle" onclick="toggleDebug()"></div>
      <span class="debug-label">デバッグログを表示（HD画像差し替え・ファイルI/O詳細）</span>
    </div>
  </div>

  <!-- ダウンロード -->
  <div id="dl-wrap">
    <a class="dl-btn" id="dl-link" href="#" download>
      ⬇ 変換結果をダウンロード
    </a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/pyodide/v0.27.4/full/pyodide.js"></script>
<script>
const PAGE_VERSION = '0.1.0';
let pyodide = null;
let selectedFile = null;
let fmt = 'EPUB';
let debugMode = false;

const logEl = document.getElementById('log');

function appendLog(msg, cls) {
  const s = document.createElement('span');
  if (cls) s.className = cls;
  s.textContent = msg + '\n';
  logEl.appendChild(s);
  logEl.scrollTop = logEl.scrollHeight;
}
function logOk(m)   { appendLog('[OK]  ' + m, 'ok'); }
function logErr(m)  { appendLog('[ERR] ' + m, 'err'); }
function logDbg(m)  { if (debugMode) appendLog('[DBG] ' + m, 'dbg'); }
function logInf(m)  { appendLog('[INF] ' + m, 'inf'); }
function logWarn(m) { appendLog('[WRN] ' + m, 'warn'); }

function toggleDebug() {
  debugMode = !debugMode;
  const t = document.getElementById('dbg-toggle');
  t.classList.toggle('on', debugMode);
}

function setFmt(f) {
  fmt = f;
  ['EPUB','ZIP','ZIP_D'].forEach(x => {
    document.getElementById('fmt-'+x.toLowerCase().replace('_','-')).classList.toggle('selected', x===f);
  });
}

function setStep(id, state) {
  const b = document.getElementById(id);
  b.classList.remove('active','done','error');
  if (state) b.classList.add(state);
}

function onDrop(ev) {
  ev.preventDefault();
  document.getElementById('drop').classList.remove('dragover');
  const f = ev.dataTransfer.files[0];
  if (f) setFile(f);
}
function onFileSelect(input) {
  if (input.files[0]) setFile(input.files[0]);
}
function setFile(f) {
  selectedFile = f;
  document.getElementById('fname').textContent = f.name + ' (' + (f.size/1024).toFixed(0) + ' KB)';
  if (pyodide) document.getElementById('btn-run').disabled = false;
}

async function loadPyodide_() {
  const btn = document.getElementById('btn-pyodide');
  btn.disabled = true;
  setStep('btn-pyodide', 'active');
  logInf('Pyodide をロード中 ...');
  try {
    pyodide = await loadPyodide({ indexURL: 'https://cdn.jsdelivr.net/pyodide/v0.27.4/full/' });
    const ver = pyodide.runPython('import sys; sys.version');
    logOk('Pyodide 準備完了 — Python ' + ver.split(' ')[0]);
    setStep('btn-pyodide', 'done');
    document.getElementById('btn-core').disabled = false;
  } catch(e) {
    logErr('Pyodide ロード失敗: ' + e.message);
    setStep('btn-pyodide', 'error');
    btn.disabled = false;
  }
}

async function loadCore() {
  const btn = document.getElementById('btn-core');
  btn.disabled = true;
  setStep('btn-core', 'active');
  logInf('kindleunpackcore をロード中 ...');

  const BASE = '../kindleunpackcore/';
  const files = [
    '__init__.py','compatibility_utils.py','imghdr.py',
    'mobi_cover.py','mobi_dict.py','mobi_header.py','mobi_html.py',
    'mobi_index.py','mobi_k8proc.py','mobi_k8resc.py','mobi_nav.py',
    'mobi_ncx.py','mobi_opf.py','mobi_pagemap.py','mobi_sectioner.py',
    'mobi_split.py','mobi_uncompress.py','mobi_utils.py','mobiml2xhtml.py',
    'unipath.py','unpack_structure.py','kindleunpack.py','DumpAZW6_v01.py'
  ];

  try {
    pyodide.runPython("import os; os.makedirs('/kindleunpackcore', exist_ok=True)");
    let ok = 0;
    for (const fname of files) {
      const r = await fetch(BASE + fname);
      if (!r.ok) { logWarn('SKIP ' + fname + ' (' + r.status + ')'); continue; }
      const text = await r.text();
      pyodide.FS.writeFile('/kindleunpackcore/' + fname, text);
      logDbg('loaded: ' + fname);
      ok++;
    }
    logOk(ok + '/' + files.length + ' ファイルをロード');

    // sys.path 設定
    pyodide.runPython("import sys; sys.path.insert(0, '/')");

    // debug print を kindleunpack.py に注入（DumpAZW6・HD画像差し替え周辺）


    // JS側のデバッグ受信関数を登録（window経由でPythonからアクセス可能にする）
    window._pyDebug = function(msg) { logDbg('py: ' + msg); };
    window._js_log_dbg  = (msg) => logDbg('py: ' + msg);
    window._js_log_warn = (msg) => logWarn('py: ' + msg);
    window._js_log_ok   = (msg) => logOk('py: ' + msg);
    pyodide.globals.set('_js_log_dbg',  window._js_log_dbg);
    pyodide.globals.set('_js_log_warn', window._js_log_warn);
    pyodide.globals.set('_js_log_ok',   window._js_log_ok);

    // インポートテスト
    const result = pyodide.runPython(`
results = []
for mod in ['kindleunpackcore.compatibility_utils','kindleunpackcore.mobi_cover',
            'kindleunpackcore.unpack_structure','kindleunpackcore.kindleunpack']:
    try:
        __import__(mod)
        results.append('OK: ' + mod)
    except Exception as e:
        results.append('NG: ' + mod + ': ' + str(e)[:100])
'\\n'.join(results)
`);
    let allOk = true;
    for (const line of result.split('\n')) {
      if (line.startsWith('OK')) logOk(line.slice(4));
      else { logErr(line.slice(4)); allOk = false; }
    }

    if (allOk) {
      logOk('全モジュール OK — 変換の準備完了');
      setStep('btn-core', 'done');
      if (selectedFile) document.getElementById('btn-run').disabled = false;
    } else {
      setStep('btn-core', 'error');
      btn.disabled = false;
    }
  } catch(e) {
    logErr('コアロード失敗: ' + e.message);
    setStep('btn-core', 'error');
    btn.disabled = false;
  }
}

async function runConvert() {
  if (!selectedFile || !pyodide) return;
  document.getElementById('btn-run').disabled = true;
  document.getElementById('dl-wrap').style.display = 'none';
  logInf('変換開始: ' + selectedFile.name + ' → ' + fmt);

  try {
    // ファイルをPyodide FSに書き込む
    const buf = await selectedFile.arrayBuffer();
    const u8 = new Uint8Array(buf);
    pyodide.FS.writeFile('/input.azw3', u8);
    logDbg('input file written: ' + u8.length + ' bytes');

    // outdir 準備
    pyodide.runPython(`
import os, shutil
outdir = '/output'
if os.path.exists(outdir): shutil.rmtree(outdir)
os.makedirs(outdir)
`);

    const fmtArg = fmt === 'ZIP_D' ? 'ZIP' : fmt;
    const compressArg = fmt === 'ZIP_D' ? 'D' : 'S';

    const result = pyodide.runPython(`
import sys, os, traceback

# JS側のコールバックをjs.globalThis経由で取得
from js import globalThis as _gt
_noop = lambda m: None
try:
    _js_log_dbg  = _gt._js_log_dbg
except: _js_log_dbg  = _noop
try:
    _js_log_warn = _gt._js_log_warn
except: _js_log_warn = _noop
try:
    _js_log_ok   = _gt._js_log_ok
except: _js_log_ok   = _noop

# printをキャプチャ
import builtins
_orig_print = builtins.print
def _captured_print(*args, **kwargs):
    msg = ' '.join(str(a) for a in args)
    _js_log_dbg(msg)
builtins.print = _captured_print

try:
    # importはprint上書き後に
    import importlib
    import kindleunpackcore.kindleunpack as ku
    importlib.reload(ku)

    fmt_arg = '${fmtArg}'
    compress_arg = '${compressArg}'

    _js_log_dbg('unpackBook 開始: format=' + fmt_arg + ' compress=' + compress_arg)

    ku.unpackBook(
        '/input.azw3',
        '/output',
        format=fmt_arg,
        zipcompresstype=compress_arg,
        contentdir=''
    )
    _js_log_dbg('unpackBook 完了')

    # 出力ファイルを探す
    found = []
    for root, dirs, files in os.walk('/output'):
        for fn in files:
            fp = os.path.join(root, fn)
            found.append((fp, os.path.getsize(fp)))
            _js_log_dbg('output: ' + fp + ' (' + str(os.path.getsize(fp)) + ' B)')

    # HD画像差し替えの確認
    hd_dir = '/output/azw6_images'
    if os.path.exists(hd_dir):
        hd_files = os.listdir(hd_dir)
        _js_log_dbg('HD images dir exists: ' + str(hd_files))
    else:
        _js_log_dbg('HD images dir not found (resファイルなし → 差し替えなし)')

    # 対象ファイルを特定
    ext = '.zip' if fmt_arg == 'ZIP' else '.epub'
    target = None
    for fp, sz in found:
        if fp.endswith(ext):
            target = fp
            break

    if target:
        result = 'OK:' + target
    else:
        result = 'NG:対象ファイルが見つかりません'

except Exception as e:
    tb = traceback.format_exc()
    _js_log_warn(tb)
    result = 'NG:' + str(e)[:200]
finally:
    builtins.print = _orig_print

result
`);

    if (result.startsWith('OK:')) {
      const outPath = result.slice(3);
      logOk('変換成功: ' + outPath);

      // ダウンロード用 Blob 作成
      const outData = pyodide.FS.readFile(outPath);
      const ext = outPath.endsWith('.zip') ? 'zip' : 'epub';
      const mime = ext === 'epub' ? 'application/epub+zip' : 'application/zip';
      const blob = new Blob([outData], { type: mime });
      const url = URL.createObjectURL(blob);
      const baseName = selectedFile.name.replace(/\.[^.]+$/, '') + '.' + ext;

      const dlLink = document.getElementById('dl-link');
      dlLink.href = url;
      dlLink.download = baseName;
      dlLink.textContent = '⬇ ' + baseName + ' をダウンロード';
      document.getElementById('dl-wrap').style.display = 'block';
    } else {
      logErr('変換失敗: ' + result.slice(3));
    }
  } catch(e) {
    logErr('例外: ' + e.message);
    console.error(e);
  }

  document.getElementById('btn-run').disabled = false;
}


// drag イベントの伝播防止
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => e.preventDefault());
</script>
</body>
</html>
